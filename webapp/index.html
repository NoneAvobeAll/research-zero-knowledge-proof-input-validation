<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PVE Healthcare Form</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 540px; margin: 40px auto; padding: 0 16px; }
  h1   { font-size: 1.4rem; color: #1a3c5e; }
  label{ display: block; margin-top: 14px; font-weight: bold; font-size: .9rem; }
  input, select { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc;
                  border-radius: 4px; box-sizing: border-box; }
  button { margin-top: 20px; width: 100%; padding: 10px; background: #1a3c5e;
           color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
  button:hover { background: #265c8e; }
  #status { margin-top: 16px; padding: 12px; border-radius: 4px; display: none; }
  .ok  { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
  .err { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  .inf { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
  small { color: #666; }
</style>
</head>
<body>
<h1>🏥 Healthcare Patient Registration</h1>
<p><small>This form uses Zero-Knowledge Proofs to validate your data
without exposing all values to the receiving system.</small></p>

<form id="regForm" novalidate>
  <label>Full Name
    <input type="text" id="name" placeholder="e.g. JOHNDOE" maxlength="32" required/>
  </label>
  <label>Date of Birth
    <input type="date" id="dob" required/>
  </label>
  <label>Role / Department
    <select id="role" required>
      <option value="">— select —</option>
      <option value="1">Cardiology (1)</option>
      <option value="2">Neurology (2)</option>
      <option value="3">Oncology (3)</option>
      <option value="4">Paediatrics (4)</option>
      <option value="5">Emergency (5)</option>
      <option value="6">Radiology (6)</option>
      <option value="7">Surgery (7)</option>
      <option value="8">General Practice (8)</option>
    </select>
  </label>
  <label>Upload Path
    <input type="text" id="filePath" value="/uploads/records/" placeholder="/uploads/..." required/>
  </label>
  <!-- Hidden workflow token — set by server at form load -->
  <input type="hidden" id="token" value="0"/>
  <button type="submit">Submit with ZKP Validation</button>
</form>

<div id="status"></div>

<script src="submit.js"></script>
</body>
</html>
